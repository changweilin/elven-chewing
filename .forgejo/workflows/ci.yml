name: CI

env:
  VER_MAJOR: 26
  VER_MINOR: 4
  VER_PATCH: 1
  LLVM_MINGW_VERSION: 20260311

on:
  push:
    branches: ["main", "stable/*"]
  pull_request:
    branches: ["main", "stable/*"]
  merge_group:
    types: [checks_requested]
  workflow_call:
    inputs:
      nightly:
        description: "Update all submodules to build nightly build"
        default: true
        required: true
        type: boolean
    outputs:
      unsigned-artifact-id:
        description: "Unsigned Installer"
        value: ${{ jobs.package.outputs.unsigned-artifact-id }}

jobs:
  engine-tests:
    runs-on: fedora-latest
    name: Engine tests (cargo test)
    # Engine-only tests are safe to run on PR / merge_group because they don't
    # touch shared infrastructure or run any TSF code.
    steps:
      - uses: actions/checkout@v6

      - uses: https://github.com/Swatinem/rust-cache@v2

      # The workspace patches `chewing` to a sibling checkout while the
      # FuzzyPartialPrefix fix is unreleased. Clone it next to the workspace
      # so `cargo test` can resolve the [patch.crates-io] entry. Configure
      # CHEWING_PATCH_REPO / CHEWING_PATCH_REF as Forgejo variables.
      - name: Clone patched libchewing
        env:
          CHEWING_PATCH_REPO: ${{ vars.CHEWING_PATCH_REPO }}
          CHEWING_PATCH_REF: ${{ vars.CHEWING_PATCH_REF || 'fix/fuzzy-partial-prefix-select-with-down' }}
        run: |
          if [ -z "$CHEWING_PATCH_REPO" ]; then
            echo "::error::CHEWING_PATCH_REPO must be configured as a Forgejo variable while the local chewing patch is in place."
            exit 1
          fi
          git clone --depth 1 --branch "$CHEWING_PATCH_REF" "$CHEWING_PATCH_REPO" ../libchewing-fix-cb

      - name: Run engine kit tests
        run: cargo test -p chewing_engine_kit

  windows-integration:
    name: Windows integration (self-hosted)
    # Self-hosted runner can execute arbitrary code from the workflow file, so
    # restrict it to events that only land vetted code: post-merge pushes and
    # the merge queue. Fork PRs intentionally skip this job.
    if: github.event_name == 'push' || github.event_name == 'merge_group'
    runs-on: [self-hosted, windows]
    steps:
      - uses: actions/checkout@v6

      - uses: https://github.com/Swatinem/rust-cache@v2

      - name: Clone patched libchewing
        env:
          CHEWING_PATCH_REPO: ${{ vars.CHEWING_PATCH_REPO }}
          CHEWING_PATCH_REF: ${{ vars.CHEWING_PATCH_REF || 'fix/fuzzy-partial-prefix-select-with-down' }}
        shell: pwsh
        run: |
          if (-not $env:CHEWING_PATCH_REPO) {
            Write-Host "::error::CHEWING_PATCH_REPO must be configured as a Forgejo variable while the local chewing patch is in place."
            exit 1
          }
          if (-not (Test-Path ../libchewing-fix-cb)) {
            git clone --depth 1 --branch "$env:CHEWING_PATCH_REF" "$env:CHEWING_PATCH_REPO" ../libchewing-fix-cb
          }

      - name: Run workspace tests
        shell: pwsh
        run: cargo test --workspace --exclude xtask

  build:
    runs-on: fedora-latest
    name: Build
    needs: engine-tests
    steps:
      - name: Cache llvm-mingw
        id: cache-llvm-linux
        uses: actions/cache@v5
        with:
          path: /opt/llvm-mingw
          key: llvm-mingw-${{ runner.os }}-${{ env.LLVM_MINGW_VERSION }}
      - name: Install llvm-mingw ${{ env.LLVM_MINGW_VERSION }}
        if: steps.cache-llvm-linux.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/llvm-mingw
          cd /opt/llvm-mingw
          curl -L https://github.com/mstorsjo/llvm-mingw/releases/download/${LLVM_MINGW_VERSION}/llvm-mingw-${LLVM_MINGW_VERSION}-ucrt-ubuntu-22.04-x86_64.tar.xz | tar xJ --strip-components=1
      - name: Setup llvm-mingw
        run: |
          echo "/opt/llvm-mingw/bin" >> $GITHUB_PATH
      - name: Install build dependencies
        run: |
          sudo dnf -y install sequoia-sqv
      - name: Setup rust targets
        run: |
          rustup set auto-self-update disable
          rustup target add i686-pc-windows-gnullvm
          rustup target add x86_64-pc-windows-gnullvm

      - uses: actions/checkout@v6

      - uses: https://github.com/Swatinem/rust-cache@v2

      - name: Generate nightly version info
        if: ${{ inputs.nightly }}
        run: |
          cargo xtask update-version --major $VER_MAJOR --minor $VER_MINOR --patch $VER_PATCH -b $GITHUB_RUN_NUMBER
          cat tip/rc/version.rc
          cat installer/version.json
          cat installer/version.wxi

      - name: Generate pull_request version info
        if: github.event_name == 'pull_request'
        env:
          PR_NUMBER: ${{ github.event.number }}
        run: |
          cargo xtask update-version --major 0 --minor 0 --patch $PR_NUMBER -b $GITHUB_RUN_NUMBER
          cat tip/rc/version.rc
          cat installer/version.json
          cat installer/version.wxi

      - name: Build nightly
        if: ${{ inputs.nightly || github.event_name == 'pull_request' }}
        run: |
          cargo xtask build-installer --nightly --release --target gnullvm

      - name: Build release
        if: ${{ !inputs.nightly && github.event_name != 'pull_request' }}
        run: |
          cargo xtask build-installer --release --target gnullvm

      - name: Download pre-built components
        run: cargo xtask download-components

      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: false
        with:
          name: Installer Artifact With Debuginfo
          path: build/installer

      - name: Strip debug info
        if: false
        run: |
          x86_64-w64-mingw32-strip build/installer/x64/chewing_tip.dll
          i686-w64-mingw32-strip build/installer/x86/chewing_tip.dll
          x86_64-w64-mingw32-strip build/installer/*.exe

      - uses: https://code.forgejo.org/forgejo/upload-artifact@v4
        if: false
        with:
          name: Installer Artifact
          path: build/installer
