name: Deploy web demo

on:
  push:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - ".github/actions/prepare-libchewing/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/chewing_engine_kit/**"
      - "crates/web_demo/**"
      - "patches/**"
      - "release.pgp"
      - "xtask/**"
  pull_request:
    branches: ["main"]
    paths:
      - ".github/workflows/pages.yml"
      - ".github/actions/prepare-libchewing/**"
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/chewing_engine_kit/**"
      - "crates/web_demo/**"
      - "patches/**"
      - "release.pgp"
      - "xtask/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web demo
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare patched libchewing path
        uses: ./.github/actions/prepare-libchewing

      - name: Setup Rust wasm target
        run: rustup target add wasm32-unknown-unknown

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Install native build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang curl pkg-config sqv unzip

      - name: Install wasm-pack
        run: cargo install wasm-pack --version 0.15.0 --locked

      - name: Download libchewing dictionaries
        run: |
          mkdir -p build/installer/Dictionary
          curl -L -o "$RUNNER_TEMP/libchewing-data.zip" \
            https://codeberg.org/chewing/libchewing-data/releases/download/v2026.3.22/libchewing-data-2026.3.22-Generic.zip
          curl -L -o "$RUNNER_TEMP/libchewing-data.zip.asc" \
            https://codeberg.org/chewing/libchewing-data/releases/download/v2026.3.22/libchewing-data-2026.3.22-Generic.zip.asc
          sqv --keyring release.pgp \
            "$RUNNER_TEMP/libchewing-data.zip.asc" \
            "$RUNNER_TEMP/libchewing-data.zip"
          unzip -uoj "$RUNNER_TEMP/libchewing-data.zip" -d build/installer/Dictionary

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: crates/web_demo/package-lock.json

      - name: Install web dependencies
        working-directory: crates/web_demo
        run: npm ci

      - name: Build web demo
        working-directory: crates/web_demo
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: crates/web_demo/dist

  deploy:
    name: Deploy GitHub Pages
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
